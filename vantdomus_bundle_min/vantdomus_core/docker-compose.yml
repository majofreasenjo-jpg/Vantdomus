version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: vantdomus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vantdomus
      JWT_SECRET: CHANGE_ME_SUPER_SECRET
    depends_on:
      - db

volumes:
  dbdata:
